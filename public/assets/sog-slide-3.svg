<!-- sog-slide-3.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 1600 600">
  <defs>
    <radialGradient id="bg3" cx="30%" cy="35%" r="90%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.35" stop-color="#95ecf1"/>
      <stop offset="0.75" stop-color="#17bebb"/>
      <stop offset="1" stop-color="#0b2b33"/>
    </radialGradient>

    <filter id="glass" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="rgba(0,0,0,0.18)"/>
    </filter>
  </defs>

  <rect width="1600" height="600" fill="url(#bg3)"/>

  <!-- Organic “wing” shapes -->
  <g filter="url(#soft)" opacity="0.9">
    <path d="M1080 120
             C980 70 860 95 790 170
             C720 245 740 335 820 390
             C900 445 1010 435 1085 360
             C1160 285 1180 180 1080 120 Z"
          fill="rgba(255,255,255,0.22)"/>
    <path d="M1125 150
             C1050 115 955 135 900 190
             C845 245 860 310 920 350
             C980 390 1065 385 1120 330
             C1175 275 1200 185 1125 150 Z"
          fill="rgba(255,255,255,0.14)"/>
  </g>

  <!-- Subtle staff lines -->
  <g opacity="0.18" stroke="#0b2b33" stroke-width="2">
    <path d="M120 210 H920"/>
    <path d="M120 235 H900"/>
    <path d="M120 260 H910"/>
    <path d="M120 285 H890"/>
    <path d="M120 310 H920"/>
  </g>

  <!-- Simple treble-clef-like curve -->
  <path d="M420 140
           C360 170 360 240 420 270
           C480 300 520 250 470 220
           C420 190 360 230 390 290
           C430 380 560 360 560 270
           C560 170 460 130 420 160"
        fill="none" stroke="rgba(11,43,51,0.35)" stroke-width="10" stroke-linecap="round"/>

  <!-- Safe text zone hint (invisible) -->
  <rect x="120" y="120" width="820" height="260" fill="rgba(255,255,255,0)"/>
</svg>
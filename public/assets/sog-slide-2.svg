<!-- sog-slide-2.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 1600 600">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0b2b33"/>
      <stop offset="0.55" stop-color="#0097b2"/>
      <stop offset="1" stop-color="#95ecf1"/>
    </linearGradient>

    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.20)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.08)"/>
    </linearGradient>

    <filter id="blurShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <rect width="1600" height="600" fill="url(#bg2)"/>

  <!-- Grid lines -->
  <g opacity="0.14" stroke="white" stroke-width="1">
    <path d="M0 120 H1600"/>
    <path d="M0 240 H1600"/>
    <path d="M0 360 H1600"/>
    <path d="M0 480 H1600"/>
    <path d="M200 0 V600"/>
    <path d="M400 0 V600"/>
    <path d="M600 0 V600"/>
    <path d="M800 0 V600"/>
    <path d="M1000 0 V600"/>
    <path d="M1200 0 V600"/>
    <path d="M1400 0 V600"/>
  </g>

  <!-- Dashboard cards -->
  <g filter="url(#blurShadow)">
    <rect x="980" y="110" rx="22" ry="22" width="500" height="140" fill="url(#card)"/>
    <rect x="980" y="270" rx="22" ry="22" width="500" height="220" fill="url(#card)"/>
    <rect x="120" y="380" rx="22" ry="22" width="720" height="110" fill="rgba(255,255,255,0.10)"/>
  </g>

  <!-- Minimal “progress bars” -->
  <g opacity="0.9">
    <rect x="1030" y="155" width="340" height="12" rx="6" fill="rgba(255,255,255,0.22)"/>
    <rect x="1030" y="155" width="260" height="12" rx="6" fill="rgba(149,236,241,0.75)"/>
    <rect x="1030" y="190" width="390" height="12" rx="6" fill="rgba(255,255,255,0.22)"/>
    <rect x="1030" y="190" width="310" height="12" rx="6" fill="rgba(23,190,187,0.85)"/>

    <rect x="1030" y="315" width="420" height="12" rx="6" fill="rgba(255,255,255,0.18)"/>
    <rect x="1030" y="315" width="180" height="12" rx="6" fill="rgba(255,255,255,0.55)"/>
    <rect x="1030" y="350" width="420" height="12" rx="6" fill="rgba(255,255,255,0.18)"/>
    <rect x="1030" y="350" width="290" height="12" rx="6" fill="rgba(255,255,255,0.40)"/>
    <rect x="1030" y="385" width="420" height="12" rx="6" fill="rgba(255,255,255,0.18)"/>
    <rect x="1030" y="385" width="360" height="12" rx="6" fill="rgba(149,236,241,0.55)"/>
  </g>

  <!-- Safe text zone hint (invisible) -->
  <rect x="120" y="140" width="780" height="240" fill="rgba(255,255,255,0)"/>
</svg>